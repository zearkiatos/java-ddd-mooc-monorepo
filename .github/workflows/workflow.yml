name: Main Workflow

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: 8

    - name: Assemble
      run: make build

    - name: Check 🧪
      run: make test
