services:
  mysql:
      env_file:
        - mysql.env
      build:
        context: .
        dockerfile: mysql.Dockerfile
      container_name: mysql-test-db
      restart: unless-stopped
      tmpfs:
      - /var/lib/mysql
      ports:
        - "127.0.0.1:3307:3306"  # Bind only to localhost for security
      networks:
        testnetwork:
  rabbitmq:
      container_name: java-ddd-mooc-monorepo-rabbitmq
      image: 'rabbitmq:3.7-management'
      restart: unless-stopped
      env_file:
        - rabbitmq.env
      ports:
      - 5630:5672
      - 8090:15672
      networks:
        testnetwork:

networks:
  testnetwork:
    driver: bridge
