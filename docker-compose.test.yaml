services:
  mysql:
      env_file:
        - mysql.env
      build:
        context: .
        dockerfile: mysql.Dockerfile
      container_name: mysql-test-db
      restart: unless-stopped
      tmpfs:
      - /var/lib/mysql
      ports:
        - "127.0.0.1:3307:3306"  # Bind only to localhost for security
      networks:
        testnetwork:
  mysql-backoffice-db:
      env_file:
        - mysql.env
      environment:
        MYSQL_DATABASE: backoffice
        MYSQL_USER: backoffice_user
      build:
        context: .
        dockerfile: mysql.Dockerfile
      container_name:  mysql-backoffice-db
      restart: unless-stopped
      volumes:
        - ./data/mysql-backoffice:/var/lib/mysql
      ports:
        - "127.0.0.1:3308:3306"  # Bind only to localhost for security
      networks:
        testnetwork:
  backoffice_elasticsearch:
    container_name: backoffice-elasticsearch-test
    image: 'elasticsearch:6.8.4'
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "9300:9300"
      - "9200:9200"
    networks:
      testnetwork:
    environment:
      - discovery.type=single-node
  rabbitmq:
      container_name: java-ddd-mooc-monorepo-rabbitmq
      image: 'rabbitmq:3.7-management'
      restart: unless-stopped
      env_file:
        - rabbitmq.env
      ports:
      - 5630:5672
      - 8090:15672
      networks:
        testnetwork:

networks:
  testnetwork:
    driver: bridge
